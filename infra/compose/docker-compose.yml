services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env.example
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env.example
    volumes:
      - ../../data:/app/data

  collector:
    build:
      context: ../..
      dockerfile: infra/docker/collector.Dockerfile
    env_file:
      - ../../.env.example
    volumes:
      - ../../data:/app/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
